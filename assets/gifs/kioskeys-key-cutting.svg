<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Duplicado de llave de auto KiosKeys</title>
  <desc id="desc">Animacion de una maquina cortando una llave de auto con acabado azul nocturno.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#051426"/>
      <stop offset="0.52" stop-color="#092b4e"/>
      <stop offset="1" stop-color="#02070d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#21d6ff" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#0072bc" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00101f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5fbff"/>
      <stop offset="0.45" stop-color="#9cb6c9"/>
      <stop offset="1" stop-color="#3d5369"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#00d4ff" flood-opacity="0.25"/>
    </filter>
    <style>
      .machine{animation: hum 2.8s ease-in-out infinite; transform-origin: 540px 680px;}
      .cutter{animation: cut 2.4s ease-in-out infinite; transform-origin: 650px 560px;}
      .spark{animation: spark 1.2s ease-out infinite; transform-origin:center; opacity:0;}
      .spark.s2{animation-delay:.25s}.spark.s3{animation-delay:.5s}.spark.s4{animation-delay:.75s}
      .key{animation:keySlide 2.4s ease-in-out infinite; transform-origin:540px 760px;}
      .scan{animation:scan 3.2s ease-in-out infinite;}
      @keyframes hum{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes cut{0%,100%{transform:translate(0,0) rotate(0)}45%,58%{transform:translate(-42px,54px) rotate(-7deg)}}
      @keyframes spark{0%{transform:scale(.2) translate(0,0);opacity:0}25%{opacity:1}100%{transform:scale(1.2) translate(var(--x),var(--y));opacity:0}}
      @keyframes keySlide{0%,100%{transform:translateX(-18px)}45%,65%{transform:translateX(26px)}}
      @keyframes scan{0%{transform:translateX(-100%);opacity:0}20%,70%{opacity:.7}100%{transform:translateX(100%);opacity:0}}
    </style>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>
  <g opacity="0.45">
    <circle cx="160" cy="170" r="4" fill="#7deaff"/>
    <circle cx="900" cy="260" r="3" fill="#7deaff"/>
    <circle cx="180" cy="1160" r="5" fill="#7deaff"/>
    <circle cx="840" cy="1090" r="4" fill="#7deaff"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="150" y="230" width="780" height="860" rx="64" fill="#071323" stroke="#1f8fd8" stroke-opacity="0.42" stroke-width="4"/>
    <rect x="205" y="285" width="670" height="150" rx="30" fill="#102946" stroke="#2bdfff" stroke-opacity="0.35"/>
    <text x="540" y="377" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#e7f7ff">KiosKeys</text>
    <g class="machine">
      <rect x="210" y="500" width="660" height="330" rx="36" fill="#12395f"/>
      <rect x="260" y="555" width="350" height="74" rx="18" fill="#06111d" stroke="#4bdcff" stroke-opacity="0.45"/>
      <rect x="245" y="755" width="590" height="60" rx="18" fill="#06111d"/>
      <g class="key">
        <rect x="310" y="728" width="430" height="42" rx="18" fill="url(#steel)"/>
        <circle cx="305" cy="749" r="54" fill="none" stroke="url(#steel)" stroke-width="34"/>
        <rect x="690" y="713" width="72" height="22" rx="5" fill="url(#steel)"/>
        <rect x="730" y="751" width="52" height="20" rx="4" fill="url(#steel)"/>
      </g>
      <g class="cutter">
        <path d="M620 470h170l-58 190h-54z" fill="#c8d8e5"/>
        <circle cx="704" cy="662" r="64" fill="#ddecf5" stroke="#64788b" stroke-width="12"/>
        <circle cx="704" cy="662" r="18" fill="#23384d"/>
      </g>
      <g fill="#ffe07a">
        <circle class="spark" style="--x:-120px;--y:80px" cx="652" cy="718" r="8"/>
        <circle class="spark s2" style="--x:105px;--y:70px" cx="672" cy="721" r="6"/>
        <circle class="spark s3" style="--x:-70px;--y:-80px" cx="648" cy="706" r="7"/>
        <circle class="spark s4" style="--x:120px;--y:-54px" cx="675" cy="706" r="5"/>
      </g>
    </g>
    <rect class="scan" x="180" y="230" width="160" height="860" fill="#75efff" opacity="0.16"/>
    <text x="540" y="1005" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="800" fill="#ffffff">Copias de llaves auto</text>
    <text x="540" y="1062" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#a9dff5">Precision, seguridad y rapidez</text>
  </g>
</svg>
