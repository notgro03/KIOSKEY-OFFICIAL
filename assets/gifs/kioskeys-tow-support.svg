<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc"><title id="title">Asistencia KiosKeys con grua</title><desc id="desc">Animacion de una grua llevando un auto.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#04111e"/><stop offset=".55" stop-color="#092b4e"/><stop offset="1" stop-color="#02070d"/></linearGradient><radialGradient id="halo" cx="52%" cy="42%" r="58%"><stop offset="0" stop-color="#23e6ff" stop-opacity=".34"/><stop offset=".5" stop-color="#0072bc" stop-opacity=".14"/><stop offset="1" stop-color="#00101f" stop-opacity="0"/></radialGradient><linearGradient id="truck" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#29d8ff"/><stop offset=".45" stop-color="#0872bd"/><stop offset="1" stop-color="#05345b"/></linearGradient><linearGradient id="car" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#dff8ff"/><stop offset=".55" stop-color="#6da9c9"/><stop offset="1" stop-color="#203a50"/></linearGradient><filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#000" flood-opacity=".5"/><feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#00d4ff" flood-opacity=".22"/></filter><style>.tow{animation:drive 3.2s ease-in-out infinite;transform-origin:540px 820px}.wheel{animation:wheel 1s linear infinite;transform-origin:center}.hook{animation:hook 2.4s ease-in-out infinite;transform-origin:500px 600px}.light{animation:light 1.1s ease-in-out infinite}.road{animation:road 1.4s linear infinite}@keyframes drive{0%,100%{transform:translateX(-18px)}50%{transform:translateX(18px)}}@keyframes wheel{to{transform:rotate(360deg)}}@keyframes hook{0%,100%{transform:translateY(0)}50%{transform:translateY(22px)}}@keyframes light{0%,100%{opacity:.25}50%{opacity:1}}@keyframes road{0%{transform:translateX(0)}100%{transform:translateX(-180px)}}</style></defs><rect width="1080" height="1350" fill="url(