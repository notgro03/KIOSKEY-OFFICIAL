<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc"><title id="title">Apertura de auto KiosKeys</title><desc id="desc">Animacion de un auto desbloqueandose con telemando.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#03101f"/><stop offset=".55" stop-color="#0b3159"/><stop offset="1" stop-color="#02070d"/></linearGradient><radialGradient id="halo" cx="50%" cy="42%" r="58%"><stop offset="0" stop-color="#23e6ff" stop-opacity=".35"/><stop offset=".52" stop-color="#0072bc" stop-opacity=".14"/><stop offset="1" stop-color="#00101f" stop-opacity="0"/></radialGradient><linearGradient id="car" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2ed9ff"/><stop offset=".45" stop-color="#0a72be"/><stop offset="1" stop-color="#062a4a"/></linearGradient><filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#000" flood-opacity=".48"/><feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#00d4ff" flood-opacity=".22"/></filter><style>.remote{animation:remote 2.6s ease-in-out infinite;transform-origin:790px 870px}.beam{animation:beam 2.6s ease-in-out infinite;opacity:0}.lock{animation:unlock 2.6s ease-in-out infinite;transform-origin:540px 450px}.blink{animation:blink 2.6s ease-in-out infinite}.door{animation:door 2.6s ease-in-out infinite;transform-origin:660px 728px}@keyframes remote{0%,100%{transform:translateY(0) rotate(-8deg)}45%,60%{transform:translateY(-18px) rotate(-15deg)}}@keyframes beam{0%,28%,100%{opacity:0;transform:scale(.82)}45%,62%{opacity:.72;transform:scale(1)}}@keyframes unlock{0%,35%,100%{transform:translateY(0) rotate(0)}48%,62%{transform:translateY(-12px) rotate(-8deg)}}@keyframes blink{0%,38%,70%,100%{opacity:.25}45%,55%{opacity:1}}@keyframes door{0%,40%,100%{transform:skewY(0)}52%,66%{transform:skewY(-2deg) translateX(8px)}}</style></defs><rect width="1080" height="1350" fill="url(#bg)"/><rect width="1080" height="1350" fill="url(#halo)"/><g filter="url(#shadow)"><rect x="150" y="230" width="780" height="860" rx="64" fill="#071323" stroke="#1f8fd8" stroke-opacity=".42" stroke-width="4"/><g class="lock"><rect x="485" y="425" width="110" height="105" rx="20" fill="#dff8ff"/><path d="M505 428v-36c0-58 70-83 111-43" fill="none" stroke="#dff8ff" stroke-width="26" stroke-linecap="round"/><circle cx="540" cy="470" r="12" fill="#08233b"/><rect x="534" y="478" width="12" height="28" rx="6" fill="#08233b"/></g><g transform="translate(0 60)"><ellipse cx="540" cy="835" rx="300" ry="52" fill="#000" opacity=".35"/><path d="M230 760c18-96 95-157 188-170h230c88 18 163 72 199 169l45 13c38 11 62 45 62 83v34H128v-42c0-37 25-69 61-78z" fill="url(#car)"/><path d="M380 612h235c58 13 106 51 139 116H312c13-47 36-87 68-116z" fill="#06111d" opacity=".86"/><path class="door" d="M615 730h182v135H615z" fill="#0b4676" opacity=".62" stroke="#9beeff" stroke-opacity=".34"/><rect x="650" y="758" width="64" height="12" rx="6" fill="#dff8ff" opacity=".75"/><circle cx="300" cy="888" r="70" fill="#07101b"/><circle cx="300" cy="888" r="36" fill="#aec8da"/><circle cx="780" cy="888" r="70" fill="#07101b"/><circle cx="780" cy="888" r="36" fill="#aec8da"/><ellipse class="blink" cx="218" cy="818" rx="48" ry="16" fill="#ffe27b"/><ellipse class="blink" cx="862" cy="818" rx="48" ry="16" fill="#ffe27b"/></g><g class="beam" fill="none" stroke="#54ecff" stroke-width="8" stroke-linecap="round"><path d="M735 760c-90-70-195-102-314-94"/><path d="M768 715c-121-99-258-143-412-126"/><path d="M798 672c-154-128-326-183-515-157"/></g><g class="remote"><rect x="710" y="815" width="170" height="260" rx="50" fill="#101a29" stroke="#56e8ff" stroke-opacity=".55" stroke-width="4"/><circle cx="795" cy="905" r="42" fill="#00a3ff"/><path d="M780 905h30m-15-15v30" stroke="#fff" stroke-width="10" stroke-linecap="round"/><circle cx="770" cy="995" r="18" fill="#2fe6ff" opacity=".7"/><circle cx="820" cy="995" r="18